<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment.
      // 0 = custom domain or user site at domain root (supporticon.com)
      // 1 = project site at https://user.github.io/repo-name/
      // Dynamic calculation of path segments to keep for GitHub Pages subfolder vs custom domain
      var pathSegmentsToKeep = 0;
      if (window.location.hostname.indexOf('github.io') !== -1) {
        var pathParts = window.location.pathname.split('/');
        if (pathParts[1] && pathParts[1] !== 'index.html') {
          pathSegmentsToKeep = 1;
        }
      }

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirecting to main page...</p>
    <p>If you are not redirected automatically, <a href="/">click here</a>.</p>
  </body>
</html>
