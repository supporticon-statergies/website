name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Vite base path
        id: base
        run: |
          if [ -f public/CNAME ] || [ -f CNAME ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
            echo "Using root base path (custom domain)"
          else
            echo "path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
            echo "Using repository subpath for github.io project site"
          fi

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          if [ -f public/CNAME ]; then
            test -f dist/CNAME
            echo "CNAME present in dist:"
            cat dist/CNAME
          fi
          ls -la dist | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
