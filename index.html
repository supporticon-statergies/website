    <!-- Defer-load Tracking Scripts until User Interaction or Timeout -->
    <script type="text/javascript">
      (function() {
        var scriptsLoaded = false;
        
        function loadTrackingScripts() {
          if (scriptsLoaded) return;
          scriptsLoaded = true;

          // 1. Load Leadsy / Instantly AI
          var leadsyScript = document.createElement('script');
          leadsyScript.id = 'vtag-ai-js';
          leadsyScript.src = 'https://r2.leadsy.ai/tag.js';
          leadsyScript.async = true;
          leadsyScript.setAttribute('data-pid', 'qqzNfbthUwHyUENK');
          leadsyScript.setAttribute('data-version', '062024');
          document.head.appendChild(leadsyScript);

          // 2. Load Leadfeeder
          window.ldfdr = window.ldfdr || function () {
            (ldfdr._q = ldfdr._q || []).push([].slice.call(arguments));
          };
          var leadfeederScript = document.createElement('script');
          leadfeederScript.src = 'https://sc.lfeeder.com/lftracker_v1_p1e024BXgEW8GB6d.js';
          leadfeederScript.async = true;
          document.head.appendChild(leadfeederScript);

          cleanupListeners();
        }

        var events = ['mousemove', 'touchstart', 'mousedown', 'keydown', 'scroll'];
        
        function cleanupListeners() {
          events.forEach(function(event) {
            window.removeEventListener(event, loadTrackingScripts, { passive: true });
          });
        }

        // Listen for user interaction
        events.forEach(function(event) {
          window.addEventListener(event, loadTrackingScripts, { passive: true });
        });

        // Fallback: load after 4 seconds if no interaction occurs
        window.addEventListener('load', function() {
          setTimeout(loadTrackingScripts, 4000);
        });
      })();
    </script>

    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present at the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
